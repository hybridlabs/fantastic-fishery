modLoader = "kotlinforforge"

loaderVersion = "[4,)"
license = "${license}"
issueTrackerURL="https://github.com/hybridlabs/fantastic_fishery/issues"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
displayURL= "https://github.com/hybridlabs/fantastic_fishery"
logoFile = "${mod_id}.png"
credits = '''${credits}'''
authors = "${mod_author}"
description = '''${description}'''

[[dependencies.${mod_id}]]
modId = "forge"
mandatory = true
versionRange = "[${version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "hybrid_aquatic"
mandatory = true
versionRange = "${aquatic_version}"
ordering = "NONE"
side = "BOTH"